<!DOCTYPE html>
<html>
<head>
    <title>Splunk-Style SOC Command Center</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <style>
        body {
            background: #0b0f14;
            color: #00ff9f;
            font-family: monospace;
            margin: 0;
        }

        .header {
            padding: 10px;
            border-bottom: 1px solid #1f2a33;
            display: flex;
            justify-content: space-between;
        }

        #searchBar {
            width: 100%;
            padding: 10px;
            background: #0f141a;
            border: 1px solid #1f2a33;
            color: #00ff9f;
            font-size: 14px;
        }

        #stream {
            height: 80vh;
            overflow-y: auto;
            padding: 10px;
            background: #0f141a;
        }

        .event {
            padding: 6px;
            margin: 4px 0;
            border-left: 4px solid #00ff9f;
            cursor: pointer;
        }

        .CRITICAL { color: #ff4d4d; border-left-color: red; }
        .HIGH { color: orange; border-left-color: orange; }
        .MEDIUM { color: yellow; border-left-color: yellow; }
        .LOW { color: #00ff9f; border-left-color: #00ff9f; }

        .hidden {
            display: none;
        }

        .active {
            background: #1a2633;
        }
    </style>
</head>

<body>

<div class="header">
    <div>🚗 SOC COMMAND CENTER</div>
    <div>Splunk Search Mode ENABLED</div>
</div>

<input id="searchBar" placeholder="Search: severity=CRITICAL vehicle=CAR100 event=BRUTE_FORCE risk>200">

<div id="stream"></div>

<script>
const socket = io();
const stream = document.getElementById("stream");
const searchBar = document.getElementById("searchBar");

let events = [];

// -----------------------------
// SPLUNK-LIKE QUERY ENGINE
// -----------------------------
function matchQuery(event, query) {
    if (!query) return true;

    query = query.toLowerCase();

    let filters = query.split(" ");

    for (let f of filters) {

        if (f.includes("=")) {
            let [key, value] = f.split("=");
            if ((event[key] || "").toString().toLowerCase() !== value) return false;
        }

        else if (f.includes(">")) {
            let [key, value] = f.split(">");
            if (parseInt(event[key]) <= parseInt(value)) return false;
        }

        else if (f.includes("<")) {
            let [key, value] = f.split("<");
            if (parseInt(event[key]) >= parseInt(value)) return false;
        }

        else {
            // free text match
            if (!JSON.stringify(event).toLowerCase().includes(f)) return false;
        }
    }

    return true;
}

// -----------------------------
// RENDER FUNCTION
// -----------------------------
function render() {
    stream.innerHTML = "";

    const query = searchBar.value;

    events.slice().reverse().forEach(event => {

        if (!matchQuery(event, query)) return;

        const div = document.createElement("div");

        div.classList.add("event");
        div.classList.add(event.severity);

        div.innerHTML = `
            [LIVE] ${event.vehicle_id} |
            ${event.event_type} |
            RISK=${event.risk_score} |
            ${event.severity}
        `;

        div.onclick = () => {
            document.querySelectorAll(".event").forEach(e => e.classList.remove("active"));
            div.classList.add("active");
            console.log("INSPECT EVENT:", event);
        };

        stream.appendChild(div);
    });
}

// -----------------------------
// LIVE STREAM
// -----------------------------
socket.on("soc_event", function(event) {
    events.push(event);
    render();
});

// -----------------------------
// SEARCH INPUT
// -----------------------------
searchBar.addEventListener("input", render);

</script>

</body>
</html>
